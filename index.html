<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MM Doctor Lookup</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #2c6e6a;
    --brand-soft: #e6f2f1;
    --border: #d4d4d8;
    --bg-soft: #f8fafc;
    --text: #1a1a2e;
    --muted: #6b7280;
    --ok: #0f766e;
    --ok-bg: #ecfdf5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text); background: transparent;
  }
  .wrap { padding: 14px; width: 100%; max-width: 520px; margin: 0 auto; }

  h1.doc-title {
    font-size: 24px; font-weight: 700; color: var(--brand);
    margin: 0 0 10px; line-height: 1.2; text-align: center;
  }
  p.doc-tagline {
    font-size: 14px; color: #56666b; margin: 0 0 20px;
    line-height: 1.5; padding: 0 8px; text-align: center;
  }

  .field { margin-bottom: 14px; }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 500; }
  label .req { color: #b91c1c; }

  .name-row {
    display: flex; align-items: center; gap: 0;
  }
  .dr-prefix {
    flex-shrink: 0;
    padding: 10px 10px 10px 12px;
    font-size: 16px; font-weight: 600; color: var(--text);
    background: #f3f4f6;
    border: 1px solid #ccc;
    border-right: none;
    border-radius: 6px 0 0 6px;
    font-family: 'Poppins', inherit;
    line-height: 1.4;
  }
  .name-row input[type="text"] {
    flex: 1; min-width: 0;
    border-radius: 0 6px 6px 0;
  }

  input[type="text"], input[type="tel"] {
    width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 16px; font-family: 'Poppins', inherit; background: #fff; color: var(--text);
    transition: border-color 0.2s ease-in-out;
  }
  input:focus { outline: none; border-color: #80adaa; box-shadow: 0 0 0 2px rgba(128,173,170,0.3); }
  input.error { border-color: #b91c1c; }
  .error-msg { font-size: 11px; color: #b91c1c; margin-top: 3px; display: none; }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="doc-title">Who's your doctor?</h1>
  <p class="doc-tagline">We'll get your supplies covered &mdash; just need a prescription from your provider.</p>

  <div class="field">
    <label>Doctor Name <span class="req">*</span></label>
    <div class="name-row">
      <span class="dr-prefix">Dr.</span>
      <input type="text" id="doctorName" autocomplete="off" placeholder="First Last">
    </div>
    <div class="error-msg" id="nameError">Please enter your doctor's name.</div>
  </div>

  <div class="field">
    <label>Doctor Phone Number <span class="req">*</span></label>
    <input type="tel" id="doctorPhone" autocomplete="off" placeholder="(555) 123-4567">
    <div class="error-msg" id="phoneError">Please enter a valid 10-digit phone number.</div>
  </div>
</div>

<script>
(function () {
  var nameInput = document.getElementById('doctorName');
  var phoneInput = document.getElementById('doctorPhone');
  var nameError = document.getElementById('nameError');
  var phoneError = document.getElementById('phoneError');

  // Phone mask: auto-format to (###) ###-####
  phoneInput.addEventListener('input', function () {
    var raw = this.value.replace(/\D/g, '').slice(0, 10);
    var fmt = '';
    if (raw.length > 6) fmt = '(' + raw.slice(0,3) + ') ' + raw.slice(3,6) + '-' + raw.slice(6);
    else if (raw.length > 3) fmt = '(' + raw.slice(0,3) + ') ' + raw.slice(3);
    else if (raw.length > 0) fmt = '(' + raw;
    else fmt = '';
    this.value = fmt;
    syncValue();
  });

  // Sync on every name keystroke too
  nameInput.addEventListener('input', function () { syncValue(); });

  // Clear error styling on focus
  nameInput.addEventListener('focus', function () {
    nameInput.classList.remove('error');
    nameError.classList.remove('show');
  });
  phoneInput.addEventListener('focus', function () {
    phoneInput.classList.remove('error');
    phoneError.classList.remove('show');
  });

  function getName() {
    var raw = nameInput.value.trim();
    return raw ? 'Dr. ' + raw : '';
  }

  function getPhoneRaw() {
    return phoneInput.value.replace(/\D/g, '');
  }

  function buildPayload() {
    return {
      action: 'manual_entry',
      displayName: getName(),
      phone: phoneInput.value.trim(),
      npi: '',
      specialty: '',
      address: '',
      clinic: ''
    };
  }

  function syncValue() {
    var payload = buildPayload();
    // Only send if we have at least a name
    if (payload.displayName) {
      try {
        if (window.JFCustomWidget && typeof JFCustomWidget.sendSubmit === 'function') {
          JFCustomWidget.sendSubmit({ value: JSON.stringify(payload), valid: true });
        }
      } catch (e) { /* non-fatal */ }
    }
  }

  function validate() {
    var valid = true;
    if (!nameInput.value.trim()) {
      nameInput.classList.add('error');
      nameError.classList.add('show');
      valid = false;
    }
    var digits = getPhoneRaw();
    if (digits.length !== 10) {
      phoneInput.classList.add('error');
      phoneError.classList.add('show');
      valid = false;
    }
    return valid;
  }

  // JFCustomWidget integration
  if (window.JFCustomWidget && typeof JFCustomWidget.subscribe === 'function') {
    ['ready', 'populate', 'submit'].forEach(function (evt) {
      try {
        JFCustomWidget.subscribe(evt, function (data) {
          console.log('[mm-doctor v3] event:', evt);
          if (evt === 'submit') {
            var isValid = validate();
            var payload = buildPayload();
            try {
              JFCustomWidget.sendSubmit({
                value: JSON.stringify(payload),
                valid: isValid
              });
              console.log('[mm-doctor v3] sendSubmit fired, valid:', isValid);
            } catch (e) {
              console.warn('[mm-doctor v3] sendSubmit failed:', e.message);
            }
          }
          if (evt === 'populate' && data && data.value) {
            // Re-populate fields if JotForm sends back saved data (e.g. back button)
            try {
              var saved = JSON.parse(data.value);
              if (saved.displayName) {
                // Strip "Dr. " prefix for the input field
                var name = saved.displayName.replace(/^Dr\.\s*/i, '');
                nameInput.value = name;
              }
              if (saved.phone) phoneInput.value = saved.phone;
            } catch (e) { /* not valid JSON */ }
          }
        });
      } catch (e) {
        console.warn('[mm-doctor v3] subscribe(' + evt + ') failed:', e.message);
      }
    });
    try { JFCustomWidget.requestFrameResize({ height: 320 }); } catch (_) {}
  } else {
    console.warn('[mm-doctor v3] JFCustomWidget SDK not available');
  }

  console.log('[mm-doctor v3] loaded — manual entry mode');
})();
</script>
</body>
</html>
