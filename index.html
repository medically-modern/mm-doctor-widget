<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MM Doctor Lookup</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #2c6e6a;
    --brand-soft: #e6f2f1;
    --border: #d4d4d8;
    --bg-soft: #f8fafc;
    --text: #1a1a2e;
    --muted: #6b7280;
    --ok: #0f766e;
    --ok-bg: #ecfdf5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text); background: transparent;
  }
  .wrap { padding: 14px; width: 100%; max-width: 520px; margin: 0 auto; box-sizing: border-box; }
  h2 { font-size: 15px; margin: 0 0 6px; font-weight: 600; color: var(--text); }
  p.help { margin: 0 0 12px; font-size: 12px; color: var(--muted); line-height: 1.4; }
  .field { margin-bottom: 8px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
  input[type="text"], input[type="tel"] {
    width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 16px; font-family: 'Poppins', inherit; background: #fff; color: var(--text);
    transition: border-color 0.2s ease-in-out;
  }
  input:focus { outline: none; border-color: #80adaa; box-shadow: 0 0 0 2px rgba(128,173,170,0.3); }
  .btn {
    width: 100%; padding: 10px 14px; border: 1px solid var(--brand);
    background: var(--brand); color: #fff; border-radius: 7px; font-weight: 600;
    cursor: pointer; font-size: 14px; font-family: inherit; margin-top: 4px;
  }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .status { font-size: 12px; color: var(--muted); padding: 8px 0 0; min-height: 16px; text-align: center; }
  .status.err { color: #b91c1c; }
  .list { display: grid; gap: 6px; margin-top: 10px; }
  .card {
    display: grid; grid-template-columns: 44px 1fr auto; gap: 10px;
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    background: #fff; cursor: pointer; align-items: center;
  }
  .card:hover { border-color: var(--brand); background: var(--bg-soft); }
  .card img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #e5e7eb; }
  .info { min-width: 0; }
  .name { font-weight: 600; font-size: 13px; line-height: 1.2; overflow-wrap: break-word; word-break: break-word; }
  .sub { font-size: 11px; color: var(--muted); margin-top: 1px; line-height: 1.25; overflow-wrap: break-word; word-break: break-word; }
  .npi-mini { font-size: 10px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
  .pick { font-size: 18px; color: var(--brand); font-weight: 700; }
  .selected-card {
    margin-top: 12px; padding: 18px 16px; border: 2px solid var(--ok);
    background: var(--ok-bg); border-radius: 10px;
  }
  .selected-head {
    display: flex; gap: 16px; align-items: center; margin-bottom: 14px;
  }
  .selected-head img {
    width: 88px; height: 88px; border-radius: 50%; object-fit: cover;
    background: #e5e7eb; flex-shrink: 0;
    border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.10);
  }
  .selected-head .nm { font-weight: 700; font-size: 16px; line-height: 1.2; }
  .selected-head .sp { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.3; }
  .confirm-btn {
    width: 100%; padding: 14px 14px; background: var(--ok); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit; letter-spacing: 0.2px;
  }
  .confirm-btn:disabled { opacity: .6; cursor: not-allowed; }
  .confirm-btn.saved { background: #065f46; }
  .change-link { display: block; text-align: center; margin-top: 8px; font-size: 12px; color: var(--muted); cursor: pointer; background: none; border: none; font-family: inherit; width: 100%; padding: 0; }
  .change-link:hover { color: var(--text); }
  .none { padding: 10px; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div id="search-ui">
    <h2>Find your doctor</h2>
    <p class="help">Enter your doctor's name <strong>and</strong> either the clinic or phone — we need a second detail to match the right provider.</p>

    <div class="field"><label>First name *</label><input type="text" id="firstName" autocomplete="off"></div>
    <div class="field"><label>Last name *</label><input type="text" id="lastName" autocomplete="off"></div>
    <div class="field"><label>Clinic</label><input type="text" id="clinic" autocomplete="off" placeholder="e.g. Acme Medical"></div>
    <div class="field"><label>Phone</label><input type="tel" id="phone" autocomplete="off" placeholder="(555) 123-4567"></div>

    <button class="btn" id="search-btn" type="button">Search</button>
    <div id="status" class="status"></div>

    <div id="list" class="list" aria-live="polite"></div>
  </div>
  <div id="selected" style="display:none;"></div>
</div>

<script>
(function () {
  const API_BASE = 'https://mm-doctor-api-production.up.railway.app';
  const $ = (id) => document.getElementById(id);
  const listEl = $('list');
  const statusEl = $('status');
  const selectedEl = $('selected');
  const searchUI = $('search-ui');
  const btn = $('search-btn');
  let inflight = null;
  let submissionId = null;
  // Remember what the patient typed so we can prefer their phone/clinic over the
  // NPPES registry values (which are often a wrong generic number or an old clinic name).
  let typedSignals = { firstName: '', lastName: '', phone: '', clinic: '' };

  // Patient identity from URL params passed by JotForm (pfn/pln/pph). This lets
  // us build a deterministic join key so the webhook attaches the right doctor
  // even if two patients share a public IP (CGNAT / shared wifi collision).
  // Graceful fallback: if params are missing, keyHash stays null and we
  // continue with the original IP-only join.
  const urlParams = new URLSearchParams(window.location.search);
  const patientIdentity = {
    firstName: urlParams.get('pfn') || '',
    lastName:  urlParams.get('pln') || '',
    phone:     urlParams.get('pph') || ''
  };
  function computeKeyHash(lastName, phone) {
    if (!lastName) return null;
    const ln = String(lastName).toLowerCase().replace(/[^a-z]/g, '');
    const digits = String(phone || '').replace(/\D/g, '');
    const last4 = digits.slice(-4);
    if (!ln || last4.length < 4) return null;
    return `${ln}:${last4}`;
  }
  const patientKeyHash = computeKeyHash(patientIdentity.lastName, patientIdentity.phone);
  console.log('[mm-doctor v2] patient keyHash?', patientKeyHash ? 'yes' : 'no (URL params missing)');

  // Normalize NPPES-style names like "TRAJKO BOJADZIEVSKI, MD" → "Trajko Bojadzievski".
  // Strips common post-nominals and title-cases the rest. Preserves apostrophes/hyphens.
  // Multi-char dashed credentials (NP-C, PA-C, FNP-BC) must come BEFORE their
  // base forms in the alternation or "NP-C" gets stripped to "-C".
  const CRED_RE = /,?\s*\b(NP-?C|PA-?C|FNP-?BC|AGNP-?C|WHNP-?BC|MD|DO|NP|PA|PHD|PH\.?D|RN|APRN|DDS|DMD|DPM|FACS|FAAP|FACP|MBBS|MSN|CRNP|CNM|DNP|OD|PT|OT|DC|LMFT|LCSW)\b\.?/gi;
  function normalizeName(raw) {
    if (!raw) return '';
    let s = String(raw).replace(CRED_RE, '');
    s = s.replace(/,+\s*$/,'').replace(/\s+/g,' ').trim();
    return s.toLowerCase().replace(/(^|[\s\-'])([a-z])/g, (_, p, c) => p + c.toUpperCase());
  }

  function sid() {
    return 'D' + Math.random().toString(36).slice(2, 7).toUpperCase()
             + Math.random().toString(36).slice(2, 7).toUpperCase();
  }
  function setStatus(msg, isErr) {
    statusEl.textContent = msg || '';
    statusEl.className = 'status' + (isErr ? ' err' : '');
  }
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function readSignals() {
    return {
      firstName: $('firstName').value.trim(),
      lastName:  $('lastName').value.trim(),
      phone:     $('phone').value.trim(),
      clinic:    $('clinic').value.trim()
    };
  }
  async function search() {
    const s = readSignals();
    if (!s.firstName || !s.lastName) { setStatus('Enter first and last name.', true); return; }
    if (!s.clinic && !s.phone) { setStatus('Add clinic or phone.', true); return; }
    typedSignals = s; // remember for saveToMonday
    listEl.innerHTML = '';
    setStatus('Searching national registry\u2026');
    btn.disabled = true;
    try {
      if (inflight) inflight.abort();
      inflight = new AbortController();
      const res = await fetch(API_BASE + '/api/lookup-candidates', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(s), signal: inflight.signal
      });
      if (!res.ok) throw new Error('API ' + res.status);
      const data = await res.json();
      renderCandidates(data.candidates || []);
    } catch (err) {
      if (err.name === 'AbortError') return;
      setStatus('Couldn\u2019t load. Try again.', true);
    } finally { btn.disabled = false; }
  }
  function renderCandidates(list) {
    if (!list.length) {
      setStatus('No matches. Check spelling or add more info.', true);
      listEl.innerHTML = '<div class="none">Nothing found in the registry.</div>';
      return;
    }
    setStatus('Tap your doctor to confirm.');
    listEl.innerHTML = '';
    list.forEach((c) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${esc(c.photo_url)}" alt="" loading="lazy">
        <div class="info">
          <div class="name">${esc(normalizeName(c.displayName))}</div>
          <div class="sub">${esc(c.specialty || '')}</div>
          <div class="npi-mini">NPI ${esc(c.npi)}</div>
        </div>
        <div class="pick">\u203a</div>
      `;
      card.addEventListener('click', () => selectCandidate(c));
      listEl.appendChild(card);
    });
  }
  function selectCandidate(c) {
    searchUI.style.display = 'none';
    selectedEl.style.display = 'block';
    selectedEl.innerHTML = `
      <div class="selected-card">
        <div class="selected-head">
          <img src="${esc(c.photo_url)}" alt="">
          <div>
            <div class="nm">${esc(normalizeName(c.displayName))}</div>
            <div class="sp">${esc(c.specialty || '')}</div>
            <div class="sp">NPI ${esc(c.npi)}</div>
          </div>
        </div>
        <button type="button" class="confirm-btn" id="confirm-btn">Confirm this doctor</button>
        <button type="button" class="change-link" id="change-btn">\u2190 pick a different one</button>
      </div>
    `;
    selectedEl.querySelector('#confirm-btn').addEventListener('click', () => saveToMonday(c));
    selectedEl.querySelector('#change-btn').addEventListener('click', () => {
      selectedEl.style.display = 'none';
      selectedEl.innerHTML = '';
      searchUI.style.display = 'block';
    });
  }
  // Hold the confirmed doctor payload so the JotForm 'submit' handler can forward it.
  let pendingDoctor = null;
  const DIAG = '[mm-doctor v2]';
  console.log(DIAG, 'script loaded; JFCustomWidget?', typeof window.JFCustomWidget);

  // Subscribe to every event we can so we can see what actually fires on submit.
  if (window.JFCustomWidget && typeof JFCustomWidget.subscribe === 'function') {
    ['ready','populate','submit'].forEach(evt => {
      try {
        JFCustomWidget.subscribe(evt, function (data) {
          console.log(DIAG, 'event:', evt, 'pendingDoctor?', !!pendingDoctor);
          if (evt === 'submit') {
            try {
              const value = pendingDoctor ? JSON.stringify(pendingDoctor) : '';
              JFCustomWidget.sendSubmit({ value: value, valid: true });
              console.log(DIAG, 'sendSubmit called with value length', value.length);
            } catch (e) {
              console.warn(DIAG, 'sendSubmit failed:', e.message);
            }
          }
        });
      } catch (e) {
        console.warn(DIAG, 'subscribe(' + evt + ') failed:', e.message);
      }
    });
    try { JFCustomWidget.requestFrameResize({ height: 480 }); } catch(_) {}
  } else {
    console.warn(DIAG, 'JFCustomWidget SDK not available — iframe-embed widget may not propagate values');
  }

  function saveToMonday(c) {
    const b = selectedEl.querySelector('#confirm-btn');
    b.disabled = true;
    // Monday should get what the PATIENT typed for phone/clinic — NPPES often
    // returns an old generic main-line number or a stale clinic string. Registry
    // values are fallbacks only if the patient left those fields blank.
    pendingDoctor = {
      npi: c.npi || '',
      displayName: normalizeName(c.displayName),
      specialty: c.specialty || '',
      clinic: (typedSignals.clinic || c.clinic || '').trim(),
      phone:  (typedSignals.phone  || c.phone  || '').trim(),
      address: c.address || ''
    };
    console.log('[mm-doctor v2] doctor confirmed in widget:', pendingDoctor);
    // Belt-and-suspenders: also call sendSubmit in case this widget type does
    // propagate values (most iframe-embed widgets don't, hence the stash fallback).
    try {
      if (window.JFCustomWidget && typeof JFCustomWidget.sendSubmit === 'function') {
        JFCustomWidget.sendSubmit({ value: JSON.stringify(pendingDoctor), valid: true });
        console.log('[mm-doctor v2] sendSubmit (on-confirm) fired');
      }
    } catch (e) {
      console.warn('[mm-doctor v2] sendSubmit (on-confirm) failed:', e.message);
    }
    // Primary path: stash the doctor on the backend keyed by this browser's
    // IP + patient keyHash. Retries on transient failure; on total failure the
    // Confirm button flips to an actionable "tap to retry" state so the patient
    // knows their doctor wasn't saved (prevents silent wifi-drop data loss).
    stashDoctorWithRetry(pendingDoctor, b, c);
    b.textContent = '\u2713 Confirmed. Check the box below \u2193';
    b.classList.add('saved');
  }
  async function stashDoctorWithRetry(doctor, confirmBtn, originalCandidate) {
    const payload = { doctor, keyHash: patientKeyHash };
    const attempts = 3;
    const delays = [0, 800, 2400]; // ms before each attempt
    for (let i = 0; i < attempts; i++) {
      if (delays[i]) await new Promise(r => setTimeout(r, delays[i]));
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);
        const res = await fetch(API_BASE + '/api/intake/stash-doctor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          signal: controller.signal
        }).finally(() => clearTimeout(timer));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const j = await res.json();
        console.log('[mm-doctor v2] stash-doctor ok on attempt', i + 1, j);
        return;
      } catch (e) {
        console.warn('[mm-doctor v2] stash attempt', i + 1, 'failed:', e.message);
      }
    }
    // All attempts failed — make it visible and actionable.
    if (confirmBtn) {
      confirmBtn.disabled = false;
      confirmBtn.textContent = '\u26A0 Couldn\u2019t save doctor \u2014 tap to retry';
      confirmBtn.style.background = '#b45309';
      confirmBtn.style.borderColor = '#b45309';
      // Re-arm so the next click runs saveToMonday again from the start.
      confirmBtn.onclick = () => {
        confirmBtn.textContent = 'Saving…';
        confirmBtn.style.background = '';
        confirmBtn.style.borderColor = '';
        saveToMonday(originalCandidate);
      };
    }
  }

  // Phone mask: auto-format to (###) ###-####
  $('phone').addEventListener('input', function () {
    const raw = this.value.replace(/\D/g, '').slice(0, 10);
    let fmt = '';
    if (raw.length > 6) fmt = '(' + raw.slice(0,3) + ') ' + raw.slice(3,6) + '-' + raw.slice(6);
    else if (raw.length > 3) fmt = '(' + raw.slice(0,3) + ') ' + raw.slice(3);
    else if (raw.length > 0) fmt = '(' + raw;
    else fmt = '';
    this.value = fmt;
  });

  btn.addEventListener('click', search);
  ['firstName','lastName','phone','clinic'].forEach(id => {
    $(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); search(); } });
  });
})();
</script>
</body>
</html>
