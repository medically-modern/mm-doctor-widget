<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MM Doctor Lookup</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --brand: #2c6e6a;
    --brand-soft: #e6f2f1;
    --border: #d4d4d8;
    --bg-soft: #f8fafc;
    --text: #1a1a2e;
    --muted: #6b7280;
    --ok: #0f766e;
    --ok-bg: #ecfdf5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text); background: transparent;
    font-size: 13px;
  }
  .wrap { padding: 8px 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
  .row.triple { grid-template-columns: 1fr 1fr 70px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 2px; line-height: 1; }
  input[type="text"], input[type="tel"] {
    width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit; background: #fff; color: var(--text);
    height: 32px;
  }
  input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 2px rgba(44,110,106,.2); }
  .actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .btn {
    padding: 7px 14px; border: 1px solid var(--brand);
    background: var(--brand); color: #fff; border-radius: 6px; font-weight: 600;
    cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .status { font-size: 12px; color: var(--muted); flex: 1; }
  .status.err { color: #b91c1c; }
  .list { display: grid; gap: 6px; margin-top: 8px; }
  .card {
    display: grid; grid-template-columns: 44px 1fr auto; gap: 10px;
    padding: 7px 8px; border: 1px solid var(--border); border-radius: 8px;
    background: #fff; cursor: pointer; align-items: center;
  }
  .card:hover { border-color: var(--brand); background: var(--bg-soft); }
  .card img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #e5e7eb; }
  .info { min-width: 0; }
  .name { font-weight: 600; font-size: 13px; line-height: 1.15; }
  .sub { font-size: 11px; color: var(--muted); margin-top: 1px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .npi-mini { font-size: 10px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; margin-top: 1px; }
  .pick { font-size: 12px; color: var(--brand); font-weight: 600; }
  .selected-card {
    margin-top: 8px; padding: 10px; border: 2px solid var(--ok);
    background: var(--ok-bg); border-radius: 8px;
  }
  .selected-head { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  .selected-head img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #e5e7eb; }
  .selected-head .nm { font-weight: 700; font-size: 14px; }
  .selected-head .sp { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .confirm-btn {
    width: 100%; padding: 8px 12px; background: var(--ok); color: #fff;
    border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .confirm-btn:disabled { opacity: .6; cursor: not-allowed; }
  .confirm-btn.saved { background: #065f46; }
  .change-link { display: block; text-align: center; margin-top: 6px; font-size: 11px; color: var(--muted); cursor: pointer; background: none; border: none; font-family: inherit; width: 100%; }
  .change-link:hover { color: var(--text); }
  .none { padding: 8px; border: 1px dashed var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div id="search-ui">
    <div class="row triple">
      <div><label>First name *</label><input type="text" id="firstName" autocomplete="off"></div>
      <div><label>Last name *</label><input type="text" id="lastName" autocomplete="off"></div>
      <div><label>State</label><input type="text" id="state" autocomplete="off" maxlength="2" placeholder="NY"></div>
    </div>
    <div class="row">
      <div><label>Clinic (needed)</label><input type="text" id="clinic" autocomplete="off"></div>
      <div><label>Phone (needed)</label><input type="tel" id="phone" autocomplete="off" placeholder="555-123-4567"></div>
    </div>
    <div class="actions">
      <button class="btn" id="search-btn" type="button">Search</button>
      <div id="status" class="status">Enter name + clinic or phone.</div>
    </div>
    <div id="list" class="list" aria-live="polite"></div>
  </div>
  <div id="selected" style="display:none;"></div>
</div>

<script>
(function () {
  const API_BASE = 'https://mm-doctor-api-production.up.railway.app';

  const $ = (id) => document.getElementById(id);
  const listEl = $('list');
  const statusEl = $('status');
  const selectedEl = $('selected');
  const searchUI = $('search-ui');
  const btn = $('search-btn');
  let inflight = null;
  let submissionId = null; // correlation id for Monday write

  function sid() {
    // short correlation id shown to the user so Monday item is identifiable
    return 'D' + Math.random().toString(36).slice(2, 7).toUpperCase() +
                 Math.random().toString(36).slice(2, 7).toUpperCase();
  }

  function setStatus(msg, isErr) {
    statusEl.textContent = msg || '';
    statusEl.className = 'status' + (isErr ? ' err' : '');
  }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function readSignals() {
    return {
      firstName: $('firstName').value.trim(),
      lastName:  $('lastName').value.trim(),
      phone:     $('phone').value.trim(),
      clinic:    $('clinic').value.trim(),
      state:     $('state').value.trim().toUpperCase()
    };
  }

  async function search() {
    const signals = readSignals();
    if (!signals.firstName || !signals.lastName) {
      setStatus('Enter first and last name.', true); return;
    }
    if (!signals.clinic && !signals.phone) {
      setStatus('Add clinic or phone.', true); return;
    }
    listEl.innerHTML = '';
    setStatus('Searching the national registry\u2026');
    btn.disabled = true;

    try {
      if (inflight) inflight.abort();
      inflight = new AbortController();
      const res = await fetch(API_BASE + '/api/lookup-candidates', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(signals), signal: inflight.signal
      });
      if (!res.ok) throw new Error('API ' + res.status);
      const data = await res.json();
      renderCandidates(data.candidates || []);
    } catch (err) {
      if (err.name === 'AbortError') return;
      setStatus('Couldn\u2019t load matches. Try again.', true);
    } finally {
      btn.disabled = false;
    }
  }

  function renderCandidates(list) {
    if (!list.length) {
      setStatus('No matches. Try different spelling or details.', true);
      listEl.innerHTML = '<div class="none">Nothing found in the national registry.</div>';
      return;
    }
    setStatus('Click your doctor to confirm.');
    listEl.innerHTML = '';
    list.forEach((c) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${esc(c.photo_url)}" alt="" loading="lazy">
        <div class="info">
          <div class="name">${esc(c.displayName)}</div>
          <div class="sub">${esc(c.specialty || '')}${c.clinic ? ' \u00b7 ' + esc(c.clinic) : ''}</div>
          <div class="npi-mini">NPI ${esc(c.npi)}${c.address ? ' \u00b7 ' + esc(c.address.split(',').slice(1, 3).join(',').trim()) : ''}</div>
        </div>
        <div class="pick">Select</div>
      `;
      card.addEventListener('click', () => selectCandidate(c));
      listEl.appendChild(card);
    });
  }

  function selectCandidate(c) {
    searchUI.style.display = 'none';
    selectedEl.style.display = 'block';
    selectedEl.innerHTML = `
      <div class="selected-card">
        <div class="selected-head">
          <img src="${esc(c.photo_url)}" alt="">
          <div>
            <div class="nm">${esc(c.displayName)}</div>
            <div class="sp">${esc(c.specialty || '')}${c.clinic ? ' \u00b7 ' + esc(c.clinic) : ''}</div>
            <div class="sp">NPI ${esc(c.npi)}${c.phone ? ' \u00b7 ' + esc(c.phone) : ''}</div>
          </div>
        </div>
        <button type="button" class="confirm-btn" id="confirm-btn">Confirm &amp; save this doctor</button>
        <button type="button" class="change-link" id="change-btn">\u2190 choose a different doctor</button>
      </div>
    `;
    selectedEl.querySelector('#confirm-btn').addEventListener('click', () => saveToMonday(c));
    selectedEl.querySelector('#change-btn').addEventListener('click', () => {
      selectedEl.style.display = 'none';
      selectedEl.innerHTML = '';
      searchUI.style.display = 'block';
    });
  }

  async function saveToMonday(c) {
    const btn = selectedEl.querySelector('#confirm-btn');
    btn.disabled = true;
    btn.textContent = 'Saving\u2026';
    submissionId = submissionId || sid();
    try {
      const res = await fetch(API_BASE + '/api/save-doctor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          submissionId,
          doctor: {
            npi: c.npi, displayName: c.displayName, specialty: c.specialty,
            clinic: c.clinic, phone: c.phone, address: c.address
          }
        })
      });
      if (!res.ok) throw new Error('save ' + res.status);
      btn.textContent = '\u2713 Saved. Continue to next page.';
      btn.classList.add('saved');
      btn.disabled = true;
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Try again';
      // eslint-disable-next-line no-console
      console.error('save error', err);
    }
  }

  btn.addEventListener('click', search);
  ['firstName','lastName','phone','clinic','state'].forEach(id => {
    $(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); search(); } });
  });
})();
</script>
</body>
</html>
